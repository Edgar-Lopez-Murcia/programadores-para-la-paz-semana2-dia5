<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de participación</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>
    <section class="contenedor">
      <h1>Ayudanos a construir nuestra comunidad</h1>
      
      <p>
        Este formulario es para que compartas lo que pasa en nuestra comunidad.
         Comparte tus ideas o necesidades de la comunidad.
      </p>
      <p>  La información será usada únicamente con fines de participación y organización comunitaria. </p>
      <form>
        <div class="campo">
          <label for="nombre">Nombre del participante: </label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            placeholder="Escribe tu nombre aqui">
        </div>

        <div class="campo">
          <label for="propuesta">Propuesta de mejora o mensaje</label>
          <textarea 
            id="propuesta" 
            name="propuesta" 
            placeholder="Escribe tu propuesta para saber lo que pasa en nuestra comunidad"></textarea>
        </div>

        <div class="campo">
          <label for="contacto">Correo o teléfono de contacto </label>
          <input 
            type="text" 
            id="contacto" 
            name="contacto" 
            placeholder="Este campo es opcional">
        </div>

        <div class="campo">
          <label>
            <input type="checkbox" name="consentimiento">
            Acepto que mi información sea usada únicamente para fines de participación comunitaria.
          </label>
        </div>

        <button type="submit">Enviar participación</button>
      </form>
    </section>
  </main>

</body>
</html>
